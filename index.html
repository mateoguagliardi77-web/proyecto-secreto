<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto Secreto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<main id="escena">

    <button id="btnInicio">ABRIR INVITACIÓN</button>

    <div id="fondo"></div>

    <div id="niebla">
        <div class="capa capa1"></div>
        <div class="capa capa2"></div>
        <div class="capa capa3"></div>
        <div class="capa capa4"></div>
    </div>

    <img id="invitacion" src="invitacion.jpg">

    <video id="humo" autoplay muted loop playsinline>
        <source src="efectos/321946_medium.webm" type="video/webm">
    </video>

    <section id="contadorContainer">

        <p id="tituloContador">
            TIEMPO HASTA<br>LAS PRÓXIMAS PISTAS
        </p>

        <div id="contador">
            <span id="dias">00</span>
            <span class="separador">:</span>
            <span id="horas">00</span>
            <span class="separador">:</span>
            <span id="minutos">00</span>
            <span class="separador">:</span>
            <span id="segundos">00</span>
        </div>

        <div id="etiquetas">
            <span>DÍAS</span>
            <span>HORAS</span>
            <span>MIN</span>
            <span>SEG</span>
        </div>

        <button id="btnPistas">SEGUIR LAS PISTAS</button>

    </section>

    <video id="videoFinal" playsinline>
        <source src="videos/video.mp4" type="video/mp4">
    </video>

    <div id="fundido"></div>

   <source src="sonidos/WhatsApp-Audio-2026-07-20-at-7.25.42-PM.mp3?v=2" type="audio/mpeg">

</main>

<script src="script.js" defer></script>

</body>
</html>
